<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>등불 — 말씀으로 걷는 길</title>
<meta name="description" content="고민을 나누면 성경 말씀으로 조언해주는 앱">
<meta name="theme-color" content="#1c1611">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="등불">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1c1611;
    --bg-alt:#241c15;
    --paper:#f3e8ce;
    --paper-shadow:#d9c9a3;
    --ink:#2b2118;
    --text-light:#ece0c6;
    --text-muted:#a89878;
    --gold:#c9a44c;
    --gold-bright:#e4c77b;
    --seal:#8b3a2e;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:
      radial-gradient(ellipse 800px 500px at 50% -10%, rgba(201,164,76,0.10), transparent 60%),
      var(--bg);
    color:var(--text-light);
    font-family:'Noto Sans KR', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:48px 20px 80px;
  }
  .app{
    width:100%;
    max-width:600px;
  }

  /* ---------- Install banner ---------- */
  .install-banner{
    position:fixed;
    top:0; left:0; right:0;
    z-index:50;
    display:none;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:var(--bg-alt);
    border-bottom:1px solid rgba(201,164,76,0.2);
    padding:10px 16px;
    font-size:0.8rem;
    color:var(--text-muted);
    text-align:center;
    flex-wrap:wrap;
  }
  .install-banner.visible{ display:flex; }
  .install-btn{
    background:var(--gold);
    color:#1c1611;
    border:none;
    padding:5px 14px;
    border-radius:4px;
    font-weight:700;
    font-size:0.78rem;
    cursor:pointer;
  }
  .install-close{
    background:transparent;
    border:none;
    color:var(--text-muted);
    cursor:pointer;
    font-size:0.85rem;
    padding:2px 6px;
  }
  .install-close:hover{ color:var(--gold-bright); }

  /* ---------- Hero / Lamp ---------- */
  .hero{
    text-align:center;
    margin-bottom:40px;
  }
  .lamp-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:14px;
  }
  .flame{
    animation:flicker 2.8s ease-in-out infinite;
    transform-origin:50% 100%;
    filter:drop-shadow(0 0 10px rgba(228,199,123,0.55));
  }
  .flame.searching{ animation:flicker-fast 0.5s ease-in-out infinite; }
  @keyframes flicker{
    0%,100%{ transform:scaleY(1) scaleX(1) rotate(0deg); opacity:1; }
    25%{ transform:scaleY(1.05) scaleX(0.96) rotate(-1deg); opacity:0.96; }
    50%{ transform:scaleY(0.97) scaleX(1.03) rotate(1deg); opacity:1; }
    75%{ transform:scaleY(1.03) scaleX(0.98) rotate(-0.5deg); opacity:0.94; }
  }
  @keyframes flicker-fast{
    0%,100%{ transform:scaleY(1) scaleX(1); opacity:1; }
    50%{ transform:scaleY(1.18) scaleX(0.9); opacity:0.85; }
  }
  h1{
    font-family:'Noto Serif KR', serif;
    font-weight:700;
    font-size:2.1rem;
    letter-spacing:0.02em;
    color:var(--gold-bright);
    margin-bottom:8px;
  }
  .tagline{
    font-size:0.92rem;
    color:var(--text-muted);
    font-weight:300;
    letter-spacing:0.03em;
  }

  /* ---------- Input ---------- */
  .desk{
    background:var(--bg-alt);
    border:1px solid rgba(201,164,76,0.18);
    border-radius:6px;
    padding:22px;
    box-shadow:0 20px 60px rgba(0,0,0,0.4), inset 0 0 40px rgba(201,164,76,0.03);
  }
  textarea{
    width:100%;
    background:transparent;
    border:none;
    outline:none;
    resize:vertical;
    min-height:100px;
    color:var(--text-light);
    font-family:'Noto Sans KR', sans-serif;
    font-size:1rem;
    line-height:1.7;
    font-weight:300;
  }
  textarea::placeholder{ color:var(--text-muted); }
  .desk-footer{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid rgba(201,164,76,0.12);
  }
  button.submit{
    background:linear-gradient(135deg, var(--gold) 0%, #a5793a 100%);
    color:#1c1611;
    border:none;
    padding:11px 22px;
    border-radius:4px;
    font-family:'Noto Sans KR', sans-serif;
    font-weight:700;
    font-size:0.92rem;
    letter-spacing:0.02em;
    cursor:pointer;
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  button.submit:hover:not(:disabled){ transform:translateY(-1px); box-shadow:0 6px 18px rgba(201,164,76,0.3); }
  button.submit:disabled{ opacity:0.5; cursor:default; }
  button.submit:focus-visible{ outline:2px solid var(--gold-bright); outline-offset:2px; }

  /* ---------- Chips ---------- */
  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:14px;
    justify-content:center;
  }
  .chip{
    font-size:0.78rem;
    color:var(--text-muted);
    border:1px solid rgba(201,164,76,0.22);
    padding:6px 13px;
    border-radius:20px;
    cursor:pointer;
    transition:border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    letter-spacing:0.01em;
  }
  .chip:hover{
    border-color:var(--gold);
    color:var(--gold-bright);
    background:rgba(201,164,76,0.06);
  }

  /* ---------- Status ---------- */
  .status{
    text-align:center;
    color:var(--text-muted);
    font-size:0.88rem;
    margin-top:22px;
    letter-spacing:0.02em;
    min-height:20px;
  }
  .error-box{
    margin-top:22px;
    padding:14px 16px;
    border:1px solid rgba(139,58,46,0.5);
    background:rgba(139,58,46,0.12);
    border-radius:4px;
    color:#e0b3a8;
    font-size:0.88rem;
    line-height:1.6;
  }

  /* ---------- Results ---------- */
  .results{ margin-top:34px; display:none; }
  .results.visible{ display:block; animation:fadeUp 0.6s ease; }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

  .opening{
    font-family:'Noto Serif KR', serif;
    font-size:1.02rem;
    line-height:1.85;
    color:var(--text-light);
    font-weight:400;
    padding:0 6px 26px;
    border-bottom:1px solid rgba(201,164,76,0.15);
    margin-bottom:26px;
  }

  .verse-card{
    background:var(--paper);
    color:var(--ink);
    border-radius:2px;
    padding:24px 24px 22px;
    margin-bottom:18px;
    position:relative;
    box-shadow:0 12px 24px rgba(0,0,0,0.35), 0 2px 0 var(--paper-shadow);
  }
  .verse-card:nth-child(odd){ transform:rotate(-0.4deg); }
  .verse-card:nth-child(even){ transform:rotate(0.4deg); }

  .seal{
    position:absolute;
    top:-14px;
    left:22px;
    width:34px;
    height:34px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #a8483a, var(--seal) 70%);
    color:var(--paper);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Noto Serif KR', serif;
    font-weight:700;
    font-size:0.95rem;
    box-shadow:0 3px 8px rgba(0,0,0,0.4);
  }
  .verse-ref{
    font-family:'Noto Sans KR', sans-serif;
    font-weight:700;
    font-size:0.78rem;
    letter-spacing:0.06em;
    color:var(--seal);
    text-transform:none;
    margin:8px 0 10px;
  }
  .verse-text{
    font-family:'Noto Serif KR', serif;
    font-size:1.05rem;
    line-height:1.85;
    margin-bottom:14px;
  }
  .verse-application{
    font-size:0.88rem;
    line-height:1.75;
    color:#5a4a35;
    padding-top:12px;
    border-top:1px dashed rgba(139,58,46,0.3);
    font-weight:400;
  }
  .verse-application b{ color:var(--seal); font-weight:700; }

  .closing{
    font-family:'Noto Serif KR', serif;
    font-size:0.98rem;
    line-height:1.85;
    color:var(--gold-bright);
    text-align:center;
    padding:22px 10px 6px;
    font-style:italic;
  }

  .reset-row{
    text-align:center;
    margin-top:28px;
  }
  button.reset{
    background:transparent;
    border:1px solid rgba(201,164,76,0.3);
    color:var(--text-muted);
    padding:9px 20px;
    border-radius:4px;
    font-family:'Noto Sans KR', sans-serif;
    font-size:0.85rem;
    cursor:pointer;
    transition:border-color 0.15s ease, color 0.15s ease;
  }
  button.reset:hover{ border-color:var(--gold); color:var(--gold-bright); }
  button.reset:focus-visible{ outline:2px solid var(--gold-bright); outline-offset:2px; }

  .disclaimer{
    text-align:center;
    color:var(--text-muted);
    font-size:0.74rem;
    line-height:1.6;
    margin-top:44px;
    opacity:0.65;
  }

  @media (prefers-reduced-motion: reduce){
    .flame, .flame.searching{ animation:none; }
    .results.visible{ animation:none; }
  }
</style>
</head>
<body>
<div class="install-banner" id="installBanner">
  <span id="installText">홈 화면에 추가하면 앱처럼 쓸 수 있어요</span>
  <button id="installBtn" class="install-btn" style="display:none;">설치하기</button>
  <button id="installClose" class="install-close" aria-label="닫기">✕</button>
</div>

<div class="app">

  <div class="hero">
    <div class="lamp-wrap">
      <svg id="flameSvg" class="flame" width="46" height="60" viewBox="0 0 46 60" fill="none">
        <path d="M23 2C23 2 8 20 8 34C8 44.5 14.5 52 23 52C31.5 52 38 44.5 38 34C38 20 23 2 23 2Z" fill="url(#flameGrad)"/>
        <path d="M23 18C23 18 16 29 16 37C16 43 19 46.5 23 46.5C27 46.5 30 43 30 37C30 29 23 18 23 18Z" fill="#fff4d6" opacity="0.85"/>
        <rect x="14" y="52" width="18" height="6" rx="1.5" fill="#3a2a18"/>
        <rect x="10" y="58" width="26" height="2" rx="1" fill="#3a2a18"/>
        <defs>
          <linearGradient id="flameGrad" x1="23" y1="2" x2="23" y2="52" gradientUnits="userSpaceOnUse">
            <stop stop-color="#ffe08a"/>
            <stop offset="0.5" stop-color="#e4a83a"/>
            <stop offset="1" stop-color="#c9622f"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <h1>등불</h1>
    <div class="tagline">주의 말씀은 내 발에 등이요 내 길에 빛이니이다</div>
  </div>

  <div class="desk">
    <textarea id="concernInput" placeholder="지금 마음에 있는 고민을 편하게 적어보세요. 관계, 불안, 결정, 상실 — 무엇이든 좋습니다."></textarea>
    <div class="desk-footer">
      <button class="submit" id="submitBtn">빛 비추기</button>
    </div>
  </div>

  <div class="chips" id="chips">
    <span class="chip" data-text="요즘 미래가 너무 불안하고 계속 걱정만 됩니다.">미래 불안</span>
    <span class="chip" data-text="가까운 사람과 심하게 다퉜는데 용서가 잘 안 됩니다.">관계 갈등</span>
    <span class="chip" data-text="열심히 했는데 계속 실패해서 자존감이 낮아졌어요.">실패·자존감</span>
    <span class="chip" data-text="소중한 사람을 잃고 나서 마음을 추스르기 어렵습니다.">상실의 슬픔</span>
    <span class="chip" data-text="중요한 결정을 앞두고 있는데 어떻게 해야 할지 모르겠어요.">중요한 결정</span>
  </div>

  <div class="status" id="statusText"></div>
  <div id="errorBox"></div>

  <div class="results" id="results">
    <div class="opening" id="openingText"></div>
    <div id="verseCards"></div>
    <div class="closing" id="closingText"></div>
    <div class="reset-row">
      <button class="reset" id="resetBtn">다시 묻기</button>
    </div>
  </div>

  <div class="disclaimer">
    심각한 위기 상황에는 전문 상담 기관과 함께 이용해 주세요.
  </div>

</div>

<script>
// ---------------- PWA: 서비스 워커 등록 ----------------
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch((err) => {
      console.warn('서비스 워커 등록 실패:', err);
    });
  });
}

// ---------------- PWA: 설치 배너 ----------------
(function() {
  const banner = document.getElementById('installBanner');
  const textEl = document.getElementById('installText');
  const btn = document.getElementById('installBtn');
  const closeBtn = document.getElementById('installClose');
  let deferredPrompt = null;

  const isStandalone =
    window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true;
  if (isStandalone) return; // 이미 설치되어 앱으로 실행 중이면 배너 숨김

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    btn.style.display = 'inline-block';
    banner.classList.add('visible');
  });

  if (isIOS) {
    textEl.textContent = '홈 화면에 추가하려면: 공유 버튼 → "홈 화면에 추가"';
    banner.classList.add('visible');
  }

  btn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    banner.classList.remove('visible');
  });

  closeBtn.addEventListener('click', () => {
    banner.classList.remove('visible');
  });
})();

// ---------------- 성경 구절 표본 DB (RAG용 최소 데이터셋) ----------------
const VERSE_DB = [
  {ref:"빌립보서 4:6-7", text:"아무것도 염려하지 말고 다만 모든 일에 기도와 간구로 너희 구할 것을 감사함으로 하나님께 아뢰라 그리하면 모든 지각에 뛰어난 하나님의 평강이 너희 마음과 생각을 지키시리라", tags:["불안","걱정","평안"]},
  {ref:"마태복음 6:34", text:"그러므로 내일 일을 위하여 염려하지 말라 내일 일은 내일 염려할 것이요 한 날 괴로움은 그 날로 족하니라", tags:["불안","걱정"]},
  {ref:"베드로전서 5:7", text:"너희 염려를 다 주께 맡기라 이는 그가 너희를 돌보심이라", tags:["불안","걱정","신뢰"]},
  {ref:"이사야 41:10", text:"두려워하지 말라 내가 너와 함께 함이라 놀라지 말라 나는 네 하나님이 됨이라 내가 너를 굳세게 하리라 참으로 너를 도와주리라", tags:["두려움","용기"]},
  {ref:"여호수아 1:9", text:"내가 네게 명령한 것이 아니냐 강하고 담대하라 두려워하지 말며 놀라지 말라 네가 어디로 가든지 네 하나님 여호와가 너와 함께 하느니라", tags:["두려움","용기","결정"]},
  {ref:"시편 34:18", text:"여호와는 마음이 상한 자를 가까이 하시고 충심으로 통회하는 자를 구원하시는도다", tags:["슬픔","낙심"]},
  {ref:"시편 147:3", text:"상심한 자들을 고치시며 그들의 상처를 싸매시는도다", tags:["슬픔","낙심","상실"]},
  {ref:"마태복음 11:28", text:"수고하고 무거운 짐 진 자들아 다 내게로 오라 내가 너희를 쉬게 하리라", tags:["지침","슬픔","일"]},
  {ref:"에베소서 4:26", text:"분을 내어도 죄를 짓지 말며 해가 지도록 분을 품지 말고", tags:["분노"]},
  {ref:"잠언 15:1", text:"유순한 대답은 분노를 쉬게 하여도 과격한 말은 노를 격동하느니라", tags:["분노","관계","다툼"]},
  {ref:"야고보서 1:19", text:"사람마다 듣기는 속히 하고 말하기는 더디 하며 성내기도 더디 하라", tags:["분노","관계"]},
  {ref:"마태복음 6:14", text:"너희가 사람의 잘못을 용서하면 너희 하늘 아버지께서도 너희 잘못을 용서하시려니와", tags:["용서"]},
  {ref:"골로새서 3:13", text:"누가 누구에게 불만이 있거든 서로 용납하여 피차 용서하되 주께서 너희를 용서하신 것같이 너희도 그리하라", tags:["용서","관계"]},
  {ref:"고린도전서 13:4", text:"사랑은 오래 참고 사랑은 온유하며 시기하지 아니하며 사랑은 자랑하지 아니하며 교만하지 아니하며", tags:["사랑","관계","결혼"]},
  {ref:"요한일서 4:18", text:"사랑 안에 두려움이 없고 온전한 사랑이 두려움을 내쫓나니", tags:["사랑","두려움"]},
  {ref:"로마서 12:18", text:"할 수 있거든 너희로서는 모든 사람과 더불어 화평하라", tags:["관계","다툼"]},
  {ref:"잠언 17:17", text:"친구는 사랑이 끊어지지 아니하고 형제는 위급한 때를 위하여 났느니라", tags:["관계","외로움"]},
  {ref:"야고보서 1:2-4", text:"너희가 여러 가지 시험을 만나거든 온전히 기쁘게 여기라 이는 너희 믿음의 시련이 인내를 만들어 내는 줄 앎이라", tags:["인내","시험"]},
  {ref:"로마서 5:3-4", text:"환난은 인내를, 인내는 연단을, 연단은 소망을 이루는 줄 앎이로다", tags:["인내","희망"]},

const ALL_TAGS = [...new Set(VERSE_DB.flatMap(v => v.tags))];

// ---------------- 전체 성경 (내장 데이터, 외부 fetch 없음) ----------------
const BOOK_NAMES_KO = [
  "창세기","출애굽기","레위기","민수기","신명기","여호수아","사사기","룻기","사무엘상","사무엘하",
  "열왕기상","열왕기하","역대상","역대하","에스라","느헤미야","에스더","욥기","시편","잠언",
  "전도서","아가","이사야","예레미야","예레미야애가","에스겔","다니엘","호세아","요엘","아모스",
  "오바댜","요나","미가","나훔","하박국","스바냐","학개","스가랴","말라기",
  "마태복음","마가복음","누가복음","요한복음","사도행전","로마서","고린도전서","고린도후서","갈라디아서","에베소서",
  "빌립보서","골로새서","데살로니가전서","데살로니가후서","디모데전서","디모데후서","디도서","빌레몬서","히브리서","야고보서",
  "베드로전서","베드로후서","요한일서","요한이서","요한삼서","유다서","요한계시록"
];
let fullBibleCache = null;
let fullBibleFailed = false;

async function loadFullBible() {
  if (fullBibleCache) return fullBibleCache;
  if (fullBibleFailed) return null;
  try {
    const res = await fetch('/bible_kr.json');
    if (!res.ok) throw new Error("성경 데이터 응답 오류");
    const data = await res.json();
    if (!Array.isArray(data) || data.length < 60) throw new Error("성경 데이터 형식 오류");
    fullBibleCache = data;
    return data;
  } catch (err) {
    console.warn("성경 데이터 로드 실패, 로컬 표본으로 대체합니다:", err);
    fullBibleFailed = true;
    return null;
  }
}

function lookupVerse(bible, bookName, chapter, verseStart, verseEnd) {
  const idx = BOOK_NAMES_KO.indexOf(bookName);
  if (idx === -1) return null;
  const book = bible[idx];
  if (!book || !book.c || !book.c[chapter - 1]) return null;
  const chapterArr = book.c[chapter - 1];
  const start = verseStart - 1;
  const end = (verseEnd || verseStart) - 1;
  if (start < 0 || start >= chapterArr.length) return null;
  const slice = chapterArr.slice(start, Math.min(end + 1, chapterArr.length)).filter(Boolean);
  if (slice.length === 0) return null;
  return slice.join(" ");
}

const statusEl = document.getElementById('statusText');
const errorBox = document.getElementById('errorBox');
const resultsEl = document.getElementById('results');

const submitBtn = document.getElementById('submitBtn');

const RETRYABLE_STATUS = new Set([429, 502, 503]);
const CLIENT_MAX_RETRIES = 2;
const CLIENT_BASE_DELAY_MS = 800;

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function callClaude(messages) {
  let lastError = null;

  for (let attempt = 0; attempt <= CLIENT_MAX_RETRIES; attempt++) {
    const res = await fetch("/api/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages })
    });

    if (res.ok) {
      const data = await res.json();
      const textBlock = data.content.find(c => c.type === "text");
      if (!textBlock) throw new Error("응답에 텍스트가 없습니다.");
      return textBlock.text;
    }

    const errBody = await res.json().catch(() => ({}));
    lastError = new Error(errBody.error || ("API 요청 실패 (" + res.status + ")"));

    const canRetry = RETRYABLE_STATUS.has(res.status) && attempt < CLIENT_MAX_RETRIES;
    if (!canRetry) throw lastError;

    const delay = CLIENT_BASE_DELAY_MS * Math.pow(2, attempt);
    await sleep(delay);
  }

  throw lastError;
}

function parseJsonLoose(text) {
  const cleaned = text.replace(/```json/g, "").replace(/```/g, "").trim();
  return JSON.parse(cleaned);
}

async function proposeAndAdvise(concern) {
  const prompt = `당신은 따뜻하고 신중한 기독교 상담 도우미입니다.
사용자의 고민을 읽고, 성경 전체(66권)에서 조언에 쓸 구절을 직접 찾아 답변을 작성하세요.

반드시 아래 "정확한 책 이름 목록"에 있는 이름만 book 값으로 사용하세요 (다른 표기 금지):
${BOOK_NAMES_KO.join(", ")}

사용자 고민: "${concern}"

작업:
1. 성경 전체에서 고민과 진짜 관련 깊은 구절을 선택하세요. 몇 개가 적절한지는 직접 판단하되, 반드시 3개 이상 5개 이하로 선택하세요. 고민이 단순하면 3개로 충분하고, 여러 감정이나 측면이 얽혀 있으면 4~5개까지 늘리세요. 억지로 개수를 채우기 위해 관련성 낮은 구절을 넣지 마세요.
2. 각 구절이 고민과 어떻게 연결되는지 짧고 구체적인 적용 문장을 쓰세요 (2문장 이내).
3. 전체를 아우르는 짧은 공감의 서두 문장(opening, 2~3문장)과 마무리 격려 문장(closing, 1문장)을 쓰세요.
4. 절대 심각한 위기(자살, 자해, 학대 등) 신호가 보이면 opening에 전문가·상담기관 도움을 함께 권하는 문장을 자연스럽게 포함하세요.
5. 위에서 고른 구절과 겹치지 않는, 비슷한 주제의 예비 구절(backups) 2개도 book/chapter/verseStart만 추가로 제시하세요. (혹시 위 구절 중 일부를 실제 성경 데이터에서 찾지 못할 경우를 대비한 여분입니다)

반드시 아래 JSON 형식으로만 답하라. 다른 텍스트, 설명, 마크다운 코드블록 표시 없이 JSON 객체만 출력하라.
{
  "opening": "...",
  "verses": [
    {"book": "시편", "chapter": 23, "verseStart": 1, "verseEnd": 3, "application": "..."},
    {"book": "요한복음", "chapter": 3, "verseStart": 16, "application": "..."}
  ],
  "backups": [
    {"book": "...", "chapter": 0, "verseStart": 0}
  ],
  "closing": "..."
}
verseEnd는 여러 절을 인용할 때만 포함하고, 한 절만 인용할 때는 생략하라.`;
  const raw = await callClaude([{ role: "user", content: prompt }]);
  return parseJsonLoose(raw);
}

function resolveReferences(bible, refs) {
  const resolved = [];
  for (const r of refs) {
    const text = lookupVerse(bible, r.book, r.chapter, r.verseStart, r.verseEnd);
    if (!text) continue;
    const refLabel = r.verseEnd && r.verseEnd !== r.verseStart
      ? `${r.book} ${r.chapter}:${r.verseStart}-${r.verseEnd}`
      : `${r.book} ${r.chapter}:${r.verseStart}`;
    resolved.push({ ref: refLabel, text, application: r.application || null });
  }
  return resolved;
}

async function generateAdviceFromLocal(concern) {
  const list = VERSE_DB.map(v => `- [${v.ref}] "${v.text}"`).join("\n");
  const parsed = await runAdvicePrompt(concern, list);
  // 최종 안전장치: 3개 미만이면 후보에서 채워넣기
  if (Array.isArray(parsed.verses) && parsed.verses.length < 3) {
    const usedRefs = new Set(parsed.verses.map(v => v.ref));
    for (const c of VERSE_DB) {
      if (parsed.verses.length >= 3) break;
      if (!usedRefs.has(c.ref)) {
        parsed.verses.push({ ref: c.ref, text: c.text, application: "이 말씀도 함께 마음에 새겨보세요." });
        usedRefs.add(c.ref);
      }
    }
  }
  return parsed;
}

async function runAdvicePrompt(concern, candidateListStr) {
  const prompt = `당신은 따뜻하고 신중한 기독교 상담 도우미입니다.
아래는 사용자의 고민과, 참고 가능한 성경 구절 후보 목록입니다.

사용자 고민: "${concern}"

참고 가능한 구절 후보 (이 목록에 있는 구절만 인용할 수 있습니다. 목록에 없는 구절을 인용하거나 지어내지 마세요):
${candidateListStr}

작업:
1. 후보 중에서 사용자의 고민과 진짜 관련 깊은 구절만 선택하세요. 몇 개가 적절한지는 당신이 직접 판단하되, 반드시 3개 이상 5개 이하로 선택하세요. 고민이 단순하면 3개로 충분하고, 여러 감정이나 측면이 얽혀 있으면 4~5개까지 늘리세요. 억지로 개수를 채우기 위해 관련성이 낮은 구절을 넣지 마세요.
2. 각 구절이 고민과 어떻게 연결되는지 짧고 구체적인 적용 문장을 쓰세요 (2문장 이내).
3. 전체를 아우르는 짧은 공감의 서두 문장(opening, 2~3문장)과 마무리 격려 문장(closing, 1문장)을 쓰세요.
4. 절대 심각한 위기(자살, 자해, 학대 등) 신호가 보이면 opening에 전문가·상담기관 도움을 함께 권하는 문장을 자연스럽게 포함하세요.

반드시 아래 JSON 형식으로만 답하라. 다른 설명이나 마크다운 코드블록 표시 없이 JSON 객체만 출력하라. verses 배열은 3개 이상 5개 이하여야 한다. 구절 text는 후보 목록의 원문을 그대로 사용하라.
{
  "opening": "...",
  "verses": [
    {"ref": "...", "text": "...", "application": "..."}
  ],
  "closing": "..."
}`;
  const raw = await callClaude([{ role: "user", content: prompt }]);
  const parsed = parseJsonLoose(raw);
  if (Array.isArray(parsed.verses) && parsed.verses.length > 5) {
    parsed.verses = parsed.verses.slice(0, 5);
  }
  return parsed;
}

function renderResults(data) {
  openingEl.textContent = data.opening || "";
  cardsEl.innerHTML = "";
  (data.verses || []).forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'verse-card';
    card.innerHTML = `
      <div class="seal">${String(i + 1).padStart(2, '0')}</div>
      <div class="verse-ref">${escapeHtml(v.ref)}</div>
      <div class="verse-text">"${escapeHtml(v.text)}"</div>
      <div class="verse-application"><b>적용 · </b>${escapeHtml(v.application)}</div>
    `;
    cardsEl.appendChild(card);
  });
  closingEl.textContent = data.closing || "";
  resultsEl.classList.add('visible');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || "";
  return div.innerHTML;
}

async function handleSubmit() {
  const concern = input.value.trim();
  errorBox.innerHTML = "";
  if (!concern) {
    statusEl.textContent = "고민을 먼저 적어주세요.";
    return;
  }
  submitBtn.disabled = true;
  resultsEl.classList.remove('visible');
  flameEl.classList.add('searching');
  statusEl.textContent = "말씀을 찾는 중...";

  try {
    const bible = await loadFullBible();
    let advice = null;
    let usedFullBible = false;

    if (bible) {
      const result = await proposeAndAdvise(concern);
      let resolvedVerses = resolveReferences(bible, result.verses || []);

      // 일부 구절을 실제 성경 데이터에서 못 찾았다면 backups로 보충
      if (resolvedVerses.length < (result.verses || []).length && Array.isArray(result.backups)) {
        const backupResolved = resolveReferences(bible, result.backups);
        for (const b of backupResolved) {
          if (resolvedVerses.length >= 5) break;
          if (!resolvedVerses.find(v => v.ref === b.ref)) {
            resolvedVerses.push({ ...b, application: "이 말씀도 함께 마음에 새겨보세요." });
          }
        }
      }

      if (resolvedVerses.length >= 3) {
        advice = {
          opening: result.opening,
          closing: result.closing,
          verses: resolvedVerses.slice(0, 5)
        };
        usedFullBible = true;
      }
    }

    if (!usedFullBible) {
      // 성경 데이터 로드 실패 또는 매칭 부족 시 로컬 표본(98개)으로 대체
      statusEl.textContent = "표본 구절에서 찾는 중...";
      advice = await generateAdviceFromLocal(concern);
    }

    statusEl.textContent = usedFullBible ? "" : "※ 이번 결과는 로컬 표본 구절(98개) 기반입니다.";
    renderResults(advice);
  } catch (err) {
    console.error(err);
    errorBox.innerHTML = `<div class="error-box">문제가 발생했습니다: ${escapeHtml(err.message)}<br>잠시 후 다시 시도해 주세요.</div>`;
    statusEl.textContent = "";
  } finally {
    submitBtn.disabled = false;
    flameEl.classList.remove('searching');
  }
}

// ---------------- 빠른 시작 칩 ----------------
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    input.value = chip.dataset.text;
    input.focus();
  });
});

submitBtn.addEventListener('click', handleSubmit);
resetBtn.addEventListener('click', () => {
  input.value = "";
  resultsEl.classList.remove('visible');
  statusEl.textContent = "";
  input.focus();
});
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) handleSubmit();
});
</script>
